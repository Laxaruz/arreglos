<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EZ CERTS | Certificados Generados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}" href="/css/login.css" />
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" href="/css/dashboard.css" />
    <style>
        .stats-box {
            background-color: #f1f5f9;
            border-radius: 8px;
            text-align: center;
            padding: 15px;
        }
        .stats-box h2 { margin: 0; font-weight: bold; color: #0b2d4f; }
        .stats-box p { margin: 0; font-size: 0.85rem; color: #6c757d; }
        .table-custom thead th { background-color: #f1f5f9; color: #0b2d4f; font-weight: 600; border-bottom: none; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; background-color: #e2f0d9; color: #2e7d32; font-weight: 500;}
    </style>
</head>
<body class="bg-light">
<header class="app-header">
    <div class="container d-flex align-items-center justify-content-between py-2">
        <div class="d-flex align-items-center">
            <div class="me-3"><a th:href="@{/dashboard/admin}" class="text-decoration-none"><span class="app-logo">EZ CERTS</span></a><div class="small text-muted">Gestión de Certificados Laborales</div></div>
        </div>
        <div class="d-flex align-items-center">
            <div class="me-3 small text-muted text-end">
                <div>Bienvenido</div>
            </div>
            <div class="avatar me-2"><i class="bi bi-person-fill"></i></div>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button class="btn btn-outline-danger btn-sm">Salir</button>
            </form>
        </div>
    </div>
</header>

<section class="hero-bg pb-5">
    <div class="container pt-4">

        <!-- Botón de regreso -->
        <div class="mb-3">
            <a th:href="@{/dashboard/admin}" class="text-decoration-none text-muted" style="font-weight: 500; font-size: 0.95rem;">
                <i class="bi bi-arrow-left me-1"></i> Volver al Dashboard
            </a>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold m-0" style="color: #0b2d4f;">Certificados Generados</h3>
        </div>

        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4 p-md-5">
                <h5 class="text-primary font-weight-bold mb-4" style="color: #0b2d4f !important;"><i class="bi bi-file-earmark-text-fill me-2"></i>Certificados Generados</h5>

                <div class="row mb-4 g-3">
                    <div class="col-md-4">
                        <div class="stats-box">
                            <h2 th:text="${esteMes}">48</h2>
                            <p>Este mes</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stats-box">
                            <h2 th:text="${total}">312</h2>
                            <p th:text="'Total ' + ${anio}">Total 2024</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stats-box">
                            <h2 th:text="${hoy}">6</h2>
                            <p>Hoy</p>
                        </div>
                    </div>
                </div>

                <div class="table-responsive mt-4">
                    <table class="table table-hover table-custom align-middle">
                        <thead>
                            <tr>
                                <th>Empleado</th>
                                <th>Tipo</th>
                                <th>Fecha</th>
                                <th>Código Ref</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="cert : ${certificados}">
                                <td th:text="${cert.empleado.nombreCompleto}">Laura Aldana</td>
                                <td th:text="${cert.tipo}">Laboral</td>
                                <td th:text="${#temporals.format(cert.fechaGeneracion, 'dd/MM/yyyy')}">09/04/2026</td>
                                <td><span class="status-badge" th:text="${cert.codigoReferencia}">CERT-1234</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>

    </div>
</section>

<footer class="footer text-center py-3 mt-auto">
    <div class="container text-muted small">© 2024 EZ CERTS | <a href="#">Términos y Condiciones</a> | <a href="#">Privacidad</a></div>
</footer>
</body>
</html>
