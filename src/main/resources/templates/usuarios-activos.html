<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZ CERTS | Usuarios Activos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}" href="/css/login.css" />
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" href="/css/dashboard.css" />
    <link rel="stylesheet" th:href="@{/css/usuarios-activos.css}" href="/css/usuarios-activos.css">

</head>
<body class="bg-light">
<header class="app-header">
    <div class="container d-flex align-items-center justify-content-between py-2">
        <div class="d-flex align-items-center">
            <div class="me-3"><span class="app-logo">EZ CERTS</span><div class="small text-muted">Gestión de Certificados Laborales</div></div>
        </div>
        <div class="d-flex align-items-center">
            <div class="me-3 small text-muted">Bienvenido</div>
            <div class="avatar me-2"></div>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button class="btn btn-outline-danger btn-sm">Salir</button>
            </form>
        </div>
    </div>
</header>

<section class="hero-bg pb-5">
    <div class="container pt-4">

        <!-- Botón de regreso -->
        <div class="mb-3">
            <a th:href="@{/dashboard/admin}" class="text-decoration-none text-muted" style="font-weight: 500; font-size: 0.95rem;">
                <i class="bi bi-arrow-left me-1"></i> Volver al Dashboard
            </a>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold m-0" style="color: #0b2d4f;">Usuarios Activos</h3>
        </div>

        <div class="floating-wrapper">
            <div class="card floating-card shadow-lg">
                <div class="card-body px-4 py-4">
                    <h4 class="fw-bold mb-3 d-flex align-items-center">
                        Usuarios
                    </h4>

                    <form th:action="@{/dashboard/usuarios-activos}" method="get">
                        <div class="search-bar mb-4 d-flex">
                            <div class="input-group">
                                <span class="input-group-text bg-primary text-white border-primary"><i class="bi bi-search"></i></span>
                                <input type="text" name="buscar" th:value="${buscar}" class="form-control border-primary text-primary" placeholder="Buscar por nombre o cédula..." style="background-color: #f0f7ff;">
                                <button class="btn btn-primary px-4 fw-bold" type="submit">( Buscar )</button>
                            </div>
                        </div>
                    </form>

                    <div class="table-responsive mb-3">
                        <table class="table user-table text-center align-middle">
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>Cédula</th>
                                    <th>Rol</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="u : ${usuarios}">
                                    <td class="text-start">
                                        <i class="bi bi-person-circle fs-5 me-2 align-middle text-secondary"></i>
                                        <span class="align-middle" th:text="${u.empleado != null ? u.empleado.nombreCompleto : u.username}">Nombre</span>
                                    </td>
                                    <td th:text="${u.empleado != null ? u.empleado.numeroDocumento : '-'}">Cédula</td>
                                    <td th:text="${u.rol}">Rol</td>
                                    <td>
                                        <span class="status-indicator" th:classappend="${u.activo} ? 'active' : 'inactive'"></span>
                                        <span th:text="${u.activo ? 'Activo' : 'Inactivo'}">Activo</span>
                                    </td>
                                    <td>
                                        <a th:href="@{/dashboard/usuarios-activos/editar/{id}(id=${u.id})}" class="btn btn-outline-secondary btn-sm px-3">Editar</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="text-center mt-4">
                        <a th:href="@{/dashboard/usuarios-activos/crear}" class="btn btn-primary px-4 shadow-sm" style="background-color: #235487; border-color: #235487;">
                            + Crear Usuario
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<footer class="footer text-center py-3">
    <div class="container text-muted small">© 2024 EZ CERTS | <a href="#">Términos y Condiciones</a> | <a href="#">Privacidad</a></div>
</footer>
</body>
</html>
