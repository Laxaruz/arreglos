<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EZ CERTS | Iniciar sesión</title>
    <!-- Google Font similar al mockup -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}" href="/css/login.css" />
</head>
<body>
<div class="login-bg">
    <header class="topbar d-flex justify-content-end py-2 px-4">
        <nav>
            <a href="#" class="me-3 text-muted">Home</a>
            <a href="#" class="me-3 text-muted">Ayuda</a>
            <a href="#" class="text-muted">Soporte</a>
        </nav>
    </header>

    <main class="d-flex align-items-center justify-content-center min-vh-100">
        <div class="login-card card shadow-sm">
            <div class="card-body p-4 text-center">
                <div class="logo mb-3">
                    <h1 class="mb-0">EZ CERTS</h1>
                    <div class="subtitle">Gestión de Certificados Laborales</div>
                </div>

                <div class="alerts">
                    <div class="alert alert-danger" th:if="${param.error}">Credenciales inválidas</div>
                    <div class="alert alert-success" th:if="${param.logout}">Has cerrado sesión correctamente</div>
                </div>

                <form th:action="@{/login}" method="post" class="mt-3">
                    <div class="mb-3 input-group-lg">
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-envelope-fill text-primary"></i></span>
                            <input class="form-control" type="text" id="username" name="username" placeholder="Correo electrónico" required />
                        </div>
                    </div>

                    <div class="mb-3 input-group-lg position-relative">
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-lock-fill text-primary"></i></span>
                            <input class="form-control" type="password" id="password" name="password" placeholder="Contraseña" required />
                            <span class="input-group-text bg-white toggle-pass" onclick="togglePassword()" title="Mostrar/ocultar contraseña"><i class="bi bi-eye-slash" id="eyeIcon"></i></span>
                        </div>
                    </div>

                    <button class="btn btn-primary btn-lg w-100 rounded-pill text-uppercase" type="submit"> Iniciar sesión </button>
                </form>

                <div class="mt-3">
                    <a href="#" class="text-muted small">¿Olvidaste tu contraseña?</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer text-center py-3">
        <div class="container text-muted small">© 2024 EZ CERTS | <a href="#">Términos y Condiciones</a> | <a href="#">Privacidad</a></div>
    </footer>
</div>

<script>
    function togglePassword(){
        const pw = document.getElementById('password');
        const eye = document.getElementById('eyeIcon');
        if(pw.type === 'password'){
            pw.type = 'text';
            eye.classList.remove('bi-eye-slash'); eye.classList.add('bi-eye');
        } else {
            pw.type = 'password';
            eye.classList.remove('bi-eye'); eye.classList.add('bi-eye-slash');
        }
    }
</script>

</body>
</html>
