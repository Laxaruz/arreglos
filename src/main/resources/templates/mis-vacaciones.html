<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EZ CERTS | Mis Vacaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" href="/css/dashboard.css" />
    <link rel="stylesheet" th:href="@{/css/mis-vacaciones.css}" href="/css/mis-vacaciones.css" />
</head>
<body class="bg-light">
<header class="app-header">
    <div class="container d-flex align-items-center justify-content-between py-2">
        <div class="d-flex align-items-center">
            <div class="me-3"><span class="app-logo">EZ CERTS</span><div class="small text-muted">Gestion de Certificados Laborales</div></div>
        </div>
        <div class="d-flex align-items-center">
            <a th:href="@{/dashboard/empleado}" class="btn btn-outline-secondary btn-sm me-2">Volver</a>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button class="btn btn-outline-danger btn-sm">Salir</button>
            </form>
        </div>
    </div>
</header>

<main class="vac-page py-4">
    <div class="container">
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card stat-card h-100">
                    <div class="card-body">
                        <p class="stat-label">Pendientes</p>
                        <p class="stat-value" th:text="${pendientes}">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card h-100">
                    <div class="card-body">
                        <p class="stat-label">Aprobadas</p>
                        <p class="stat-value" th:text="${aprobadas}">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card h-100">
                    <div class="card-body">
                        <p class="stat-label">Rechazadas</p>
                        <p class="stat-value" th:text="${rechazadas}">0</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h5 class="card-title mb-3">Solicitar vacaciones</h5>

                <div th:if="${exito}" class="alert alert-success py-2 mb-3" th:text="${exito}"></div>
                <div th:if="${error}" class="alert alert-danger py-2 mb-3" th:text="${error}"></div>

                <form th:action="@{/dashboard/empleado/mis-vacaciones/solicitar}" method="post" class="row g-3 align-items-end">
                    <div class="col-md-5">
                        <label for="fechaInicio" class="form-label">Fecha inicio</label>
                        <input id="fechaInicio" name="fechaInicio" type="date" class="form-control" required />
                    </div>
                    <div class="col-md-5">
                        <label for="fechaFin" class="form-label">Fecha fin</label>
                        <input id="fechaFin" name="fechaFin" type="date" class="form-control" required />
                    </div>
                    <div class="col-md-2 d-grid">
                        <button type="submit" class="btn btn-primary">Enviar</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title mb-3">Historial de solicitudes</h5>
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Fecha inicio</th>
                            <th>Fecha fin</th>
                            <th>Estado</th>
                            <th>Comentario RRHH</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(solicitudes)}">
                            <td colspan="5" class="text-center text-muted py-4">No hay solicitudes de vacaciones registradas.</td>
                        </tr>
                        <tr th:each="solicitud : ${solicitudes}">
                            <td th:text="${solicitud.id}">1</td>
                            <td th:text="${#temporals.format(solicitud.fechaInicio, 'dd/MM/yyyy')}">20/05/2026</td>
                            <td th:text="${#temporals.format(solicitud.fechaFin, 'dd/MM/yyyy')}">25/05/2026</td>
                            <td>
                                <span class="badge rounded-pill"
                                      th:classappend="${solicitud.estado.name() == 'APROBADA'} ? 'text-bg-success' : (${solicitud.estado.name() == 'RECHAZADA'} ? 'text-bg-danger' : 'text-bg-warning')"
                                      th:text="${solicitud.estado}">
                                    PENDIENTE
                                </span>
                            </td>
                            <td th:text="${solicitud.comentarioRevision != null && !solicitud.comentarioRevision.isBlank() ? solicitud.comentarioRevision : '-'}">-</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
